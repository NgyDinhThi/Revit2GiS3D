<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Revit Style JSON Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Nền trắng tuyệt đối */
    html,body{height:100%;margin:0;background:#ffffff;overflow:hidden;}
    #hud{
      position:fixed;top:10px;left:10px;z-index:10;
      color:#333;background:rgba(255,255,255,0.9);
      padding:8px 12px;border:1px solid #ccc;border-radius:4px;
      font-family:sans-serif;font-size:13px;
    }
  </style>

  <script type="importmap">
  {
    "imports":{
      "three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>
</head>
<body>
  <div id="hud">
    <b>Revit Style JSON Viewer</b><br>
    Chế độ: Hidden Line (Tường trắng - Nét đen)<br>
    <span id="stats">Đang tải...</span>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. CẤU HÌNH SCENE
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff); // Nền trắng

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 5000);
    camera.position.set(50, 50, 50);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 2. ÁNH SÁNG (Làm cho khối trắng không bị xám xịt)
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.1); 
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    const world = new THREE.Group();
    scene.add(world);

    // 3. VẬT LIỆU
    // Tường trắng, đặc
    const matMesh = new THREE.MeshLambertMaterial({
      color: 0xffffff,
      side: THREE.DoubleSide,
      polygonOffset: true,
      polygonOffsetFactor: 1, 
      polygonOffsetUnits: 1
    });
    // Nét đen
    const matLine = new THREE.LineBasicMaterial({ color: 0x000000 });

    // 4. HÀM XỬ LÝ HÌNH HỌC
    function toVec3(arr) {
      // Giữ nguyên trục Z vì file JSON của bạn có thể đã là Z-up hoặc Y-up tùy export
      // Nếu hình bị nằm ngang, đổi dòng dưới thành: return new THREE.Vector3(arr[0], arr[2], -arr[1]);
      return new THREE.Vector3(arr[0], arr[1], arr[2]||0);
    }

    function triangulateAndBuild(coords) {
        if (!coords || !coords.length) return [];
        const outer = coords[0];
        if (outer.length < 3) return [];

        // Chiếu 3D xuống 2D để dùng Earcut cắt tam giác
        const p0 = toVec3(outer[0]);
        const p1 = toVec3(outer[1]);
        const p2 = toVec3(outer[2]);
        const u = new THREE.Vector3().subVectors(p1, p0).normalize();
        const n = new THREE.Vector3().subVectors(p2, p0).cross(u).normalize();
        const v = new THREE.Vector3().crossVectors(n, u);

        const flat2D = [];
        const holes = [];
        let indexCounter = 0;

        // Flatten dữ liệu cho Earcut
        coords.forEach((ring, i) => {
            if (i > 0) holes.push(indexCounter);
            ring.forEach(pt => {
                const vec = toVec3(pt);
                const rel = new THREE.Vector3().subVectors(vec, p0);
                flat2D.push(rel.dot(u), rel.dot(v));
                indexCounter++;
            });
        });

        const indices = earcut(flat2D, holes);
        
        // Thu thập lại tọa độ 3D thực
        const vertices3D = [];
        coords.forEach(ring => {
            ring.forEach(pt => {
                const vec = toVec3(pt);
                vertices3D.push(vec.x, vec.y, vec.z);
            });
        });

        // Map index từ Earcut sang vertex 3D
        const finalVerts = [];
        for (let i = 0; i < indices.length; i++) {
            const idx = indices[i];
            finalVerts.push(
                vertices3D[idx * 3], 
                vertices3D[idx * 3 + 1], 
                vertices3D[idx * 3 + 2]
            );
        }
        return finalVerts;
    }

    // 5. LOAD & BUILD
    const qs = new URLSearchParams(location.search);
    const file = qs.get('file');

    if(file) {
        fetch(`/data/${encodeURIComponent(file)}`)
        .then(r => r.json())
        .then(json => {
            const allVerts = [];
            const features = json.features || (json.type === 'FeatureCollection' ? json.features : []);
            
            features.forEach(f => {
                const g = f.geometry;
                if(!g) return;
                const polys = (g.type === 'MultiPolygon') ? g.coordinates : [g.coordinates];
                polys.forEach(poly => {
                    if(g.type === 'Polygon') poly = g.coordinates; // Fix cho trường hợp Polygon đơn
                    allVerts.push(...triangulateAndBuild(poly));
                });
            });

            if (allVerts.length) {
                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.Float32BufferAttribute(allVerts, 3));
                geo.computeVertexNormals();

                // A. MESH (Tường trắng)
                const mesh = new THREE.Mesh(geo, matMesh);
                world.add(mesh);

                // B. EDGES (Nét đen thông minh)
                // Threshold 15 độ: Chỉ vẽ nét ở góc vuông, ẩn nét ở mặt phẳng (ẩn đường chéo)
                const edges = new THREE.EdgesGeometry(geo, 15); 
                const lines = new THREE.LineSegments(edges, matLine);
                world.add(lines);

                // Fit Camera
                const box = new THREE.Box3().setFromObject(world);
                const size = new THREE.Vector3(); box.getSize(size);
                const center = new THREE.Vector3(); box.getCenter(center);
                world.position.sub(center); // Đưa về giữa

                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(maxDim, maxDim, maxDim);
                camera.lookAt(0,0,0);
                
                document.getElementById('stats').innerText = `Đã tải xong. Faces: ${allVerts.length/3}`;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
