    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>3D Model Viewer</title>
        <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
        <style>
            body { 
                margin: 0; 
                padding: 0; 
                width: 100vw; 
                height: 100vh; 
                background-color: #f5f5f5; 
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            /* Cho khung 3D phủ kín màn hình */
            model-viewer { 
                width: 100%; 
                height: 100%; 
                outline: none;
            }
            #error-msg { 
                display: none; 
                color: #d32f2f; 
                text-align: center; 
                padding: 20px; 
                margin-top: 50px;
            }
        </style>
    </head>
    <body>
        <div id="error-msg">Không tìm thấy file mô hình hoặc có lỗi xảy ra.</div>
        
        <model-viewer id="viewer"
                    camera-controls 
                    auto-rotate 
                    shadow-intensity="1" 
                    exposure="1"
                    environment-image="neutral">
        </model-viewer>

        <script>
            // Lấy đường dẫn API file từ thanh địa chỉ URL (ví dụ: ?file=/api/projects/P001/models/model.glb)
            const urlParams = new URLSearchParams(window.location.search);
            const fileUrl = urlParams.get('file');

            if (fileUrl) {
                // Lấy trực tiếp đường dẫn truyền sang từ RAM, KHÔNG ghép thêm '/uploads/' 
                const viewer = document.getElementById('viewer');
                viewer.src = fileUrl;
            } else {
                // Hiện thông báo lỗi nếu không có link file truyền sang
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('viewer').style.display = 'none';
            }
        </script>
    </body>
    </html>
