<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BIM Sync Manager</title>
  <style>
    /* ... (Giữ nguyên các style cũ của bạn) ... */
    
    body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
    input { height: 28px; padding: 0 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { height: 30px; padding: 0 12px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
    button.secondary { background: #e0e0e0; color: #333; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .col-tree { width: 350px; border-right: 1px solid #ddd; overflow-y: auto; padding: 10px; }
    .col-props { width: 300px; border-right: 1px solid #ddd; padding: 15px; background: #fafafa; overflow-y: auto; }
    
    /* SỬA LẠI CSS CHO PREVIEW */
    .col-preview { flex: 1; padding: 20px; background: #fff; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
    .img-container { border: 1px solid #eee; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 95%; background: white; margin-top: 10px; }
    img { max-width: 100%; height: auto; display: block; }

    /* ... (Giữ nguyên các style khác) ... */
    #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 999; justify-content: center; align-items: center; }
    .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #0078d4; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Tree styles */
    details > summary { cursor: pointer; list-style: none; padding: 4px 0; }
    .leaf { display: flex; align-items: center; padding: 4px 8px; cursor: pointer; }
    .leaf:hover { background: #f0f0f0; }
    .leaf.selected { background: #cce8ff; border: 1px solid #99d1ff; }
    .tag { font-size: 10px; background: #eee; padding: 2px 6px; border-radius: 4px; margin-left: auto; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div class="header">
  <input id="projectId" placeholder="Project ID" value="P001" style="width:80px">
  <input id="apiKey" type="password" placeholder="API Key" style="width:120px" value="CHANGE-ME-IN-PRODUCTION">
  <button onclick="loadIndex()">Refresh Tree</button>
  <div style="flex:1"></div>
  <button class="secondary" onclick="openLatest3D()">Open 3D Viewer</button>
</div>

<div class="main">
  <div class="col-tree" id="treeRoot"></div>

  <div class="col-props">
    <h3>Properties</h3>
    <div id="propMsg" style="color:#888; font-size:13px">Select an item to edit</div>
    <div id="propForm" style="display:none">
      <div style="margin-bottom:10px">
        <label style="display:block;font-size:12px;color:#666">Selected Item</label>
        <input id="p_name" disabled style="width:100%;background:#eee">
      </div>
      <div style="margin-bottom:10px">
        <label style="display:block;font-size:12px;color:#666">UniqueId</label>
        <input id="p_uid" disabled style="width:100%;background:#eee;font-family:monospace;font-size:11px">
      </div>
      <hr style="border:0;border-top:1px solid #eee;margin:15px 0">
      <div style="margin-bottom:10px">
        <label style="display:block;font-size:12px;color:#666">Update Parameter</label>
        <select id="p_param_name" style="width:100%;height:30px;margin-bottom:5px">
          <option value="Comments">Comments (Biến chú)</option>
          <option value="Sheet Name">Sheet Name (Tên bản vẽ)</option>
        </select>
        <input id="p_param_val" placeholder="New Value..." style="width:100%">
      </div>
      <button onclick="sendUpdate()" style="width:100%">Update to Revit</button>
    </div>
  </div>

  <div class="col-preview">
    <div id="previewActions" style="display:none; text-align:center; margin-bottom:10px; width:100%">
        <button onclick="requestRender()" style="background:#2b88d8; padding: 5px 20px;">📸 Render View Exact</button>
    </div>

    <div id="previewMsg" style="color:#888; margin-top:20px">Select a View to see preview</div>
    
    <div class="img-container" id="imgWrap" style="display:none">
      <img id="previewImg" alt="View Preview">
      <div style="text-align:center; margin-top:5px; font-size:11px; color:#999">
         Image from Revit
      </div>
    </div>
  </div>
</div>

<div style="padding:5px; background:#f9f9f9; border-top:1px solid #ddd; font-size:12px" id="statusBar">Ready.</div>

<script>
// --- CONFIG & UTILS ---
const CONFIG = { POLL_MS: 1000, TIMEOUT_MS: 30000 };
let selectedNode = null;

if(localStorage.getItem("apiKey")) document.getElementById("apiKey").value = localStorage.getItem("apiKey");

function getHeaders() {
  const key = document.getElementById("apiKey").value;
  localStorage.setItem("apiKey", key);
  return { "Content-Type": "application/json", "X-API-Key": key };
}
function setStatus(msg, type='') { 
    const el = document.getElementById("statusBar"); 
    el.textContent = msg; 
    el.style.color = type==='error'?'red':(type==='success'?'green':'black'); 
}
function showLoading(show) { document.getElementById("loading").style.display = show ? "flex" : "none"; }

// --- LOGIC ---
async function loadIndex() {
  const pid = document.getElementById("projectId").value;
  showLoading(true);
  try {
    const res = await fetch(`/api/projects/${pid}/browser-index/latest`);
    if(!res.ok) throw new Error("No index found. Please 'Publish' from Revit first.");
    const data = await res.json();
    renderTree(data.nodes || []);
    setStatus("Tree loaded.", "success");
  } catch(e) {
    setStatus(e.message, "error");
  } finally {
    showLoading(false);
  }
}

function renderTree(nodes) {
  const root = document.getElementById("treeRoot");
  root.innerHTML = "";
  // Simple flat list renderer for demo (Group logic omitted for brevity, using flat list)
  // Bạn có thể dùng lại hàm createDomTree cũ nếu muốn hiển thị cây đẹp hơn
  const ul = document.createElement("div");
  nodes.forEach(n => {
     const row = document.createElement("div");
     row.className = "leaf";
     // Thêm padding dựa vào độ dài path để giả lập cây
     const depth = (n.path || []).length;
     row.style.paddingLeft = (depth * 15 + 10) + "px";
     
     row.innerHTML = `<span>${n.title}</span> <span class="tag">${n.kind}</span>`;
     row.onclick = () => selectItem(row, n);
     ul.appendChild(row);
  });
  root.appendChild(ul);
}

// --- SỬA HÀM SELECT ITEM ĐỂ HIỆN NÚT RENDER ---
function selectItem(el, data) {
  document.querySelectorAll(".leaf").forEach(x => x.classList.remove("selected"));
  el.classList.add("selected");
  
  selectedNode = data;
  
  // Fill Properties
  document.getElementById("propMsg").style.display = "none";
  document.getElementById("propForm").style.display = "block";
  document.getElementById("p_name").value = data.title;
  document.getElementById("p_uid").value = data.revit?.uniqueId || "";
  
  // Setup Preview Area
  const kind = data.kind || "";
  const isView = kind === 'view' || kind === 'sheet' || kind === 'schedule';
  
  const btnArea = document.getElementById("previewActions");
  const msg = document.getElementById("previewMsg");
  const imgWrap = document.getElementById("imgWrap");

  imgWrap.style.display = "none"; // Ẩn ảnh cũ

  if (isView) {
      btnArea.style.display = "block"; // HIỆN NÚT RENDER
      msg.style.display = "block";
      msg.textContent = "Click button above to render this view.";
  } else {
      btnArea.style.display = "none"; // Ẩn nút nếu không phải View
      msg.style.display = "block";
      msg.textContent = "Preview not available for this item type.";
  }
}

async function sendUpdate() {
  if(!selectedNode) return;
  const val = document.getElementById("p_param_val").value;
  if(!val) return alert("Enter a value");
  
  showLoading(true);
  try {
     const pid = document.getElementById("projectId").value;
     const res = await fetch(`/api/projects/${pid}/commands`, {
        method: 'POST', headers: getHeaders(),
        body: JSON.stringify({
           action: "update_parameter",
           targetUniqueId: selectedNode.revit.uniqueId,
           parameters: { [document.getElementById("p_param_name").value]: val }
        })
     });
     const json = await res.json();
     if(json.error) throw new Error(json.error);
     await pollResult(pid, json.id);
  } catch(e) { setStatus(e.message, "error"); }
  finally { showLoading(false); }
}

async function requestRender() {
  if(!selectedNode) return;
  showLoading(true);
  setStatus("Requesting render...");
  try {
     const pid = document.getElementById("projectId").value;
     const res = await fetch(`/api/projects/${pid}/commands`, {
        method: 'POST', headers: getHeaders(),
        body: JSON.stringify({
           action: "render_view_png",
           targetUniqueId: selectedNode.revit.uniqueId,
           pixelSize: 1500
        })
     });
     const json = await res.json();
     await pollResult(pid, json.id);
  } catch(e) { setStatus(e.message, "error"); }
  finally { showLoading(false); }
}

async function pollResult(pid, cmdId) {
  const start = Date.now();
  while(Date.now() - start < CONFIG.TIMEOUT_MS) {
    try {
        const res = await fetch(`/api/projects/${pid}/command-results/${cmdId}`);
        const data = await res.json();
        if(data.status === "done") {
            setStatus("Success!", "success");
            if(data.imageUrl) {
                document.getElementById("previewImg").src = data.imageUrl;
                document.getElementById("imgWrap").style.display = "block"; // Hiện ảnh khi đã xong
                document.getElementById("previewMsg").style.display = "none";
            } else {
                alert("Update Success!");
            }
            return;
        }
        if(data.status === "error") throw new Error(data.message);
    } catch(e) {}
    await new Promise(r => setTimeout(r, 1000));
  }
  throw new Error("Timeout waiting for Revit.");
}

function openLatest3D() {
    const pid = document.getElementById("projectId").value;
    window.open(`/api/projects/${pid}/models/latest-glb`);
}
</script>
</body>
</html>
