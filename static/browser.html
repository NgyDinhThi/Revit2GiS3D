<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BIM Sync Manager</title>
  
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div id="loadingText" style="color:#555; font-weight:600">Processing...</div>
</div>

<div class="header">
  <div class="brand-title">BIM Sync</div>
  <input id="projectId" placeholder="Project ID" value="P001" style="width:70px" title="Project ID">
  <input id="apiKey" type="password" placeholder="API Key" style="width:140px" value="CHANGE-ME-IN-PRODUCTION" title="API Key">
  
  <input id="q" placeholder="Search tree..." style="width:160px">
  <button onclick="loadIndex()" title="Load cấu trúc từ Server"> Làm mới</button>
  
  <div style="flex:1"></div>
  <button class="secondary" onclick="openLatest3D()"> Xem mô hình 3D</button>
</div>

<div class="main">
  <div class="col-tree" id="treeRoot">
    <div style="color:var(--text-muted); text-align:center; margin-top:40px">
      <p>1. Nhấn <b>"Publish to Web"</b> trong Revit.</p>
      <p>2. Nhấn <b>"Làm mới"</b> ở trên để xem dữ liệu.</p>
    </div>
  </div>

  <div class="col-props">
    <h3>Chỉ số</h3>
    <div id="propMsg" style="color:var(--text-muted); font-size:13px; font-style:italic">Nơi hiện chỉ số</div>
    
    <div id="propForm" style="display:none">
      <div class="prop-group">
        <label class="prop-label">Item Name</label>
        <input id="p_name" disabled class="prop-input-disabled">
      </div>
      <div class="prop-group">
        <label class="prop-label">UniqueId</label>
        <input id="p_uid" disabled class="prop-input-disabled prop-input-mono">
      </div>
      
      <hr style="border:0; border-top:1px solid var(--border-color); margin:20px 0">
      
      <div class="prop-group">
        <label class="prop-label" style="color:var(--primary-color)">Update Revit Parameter</label>
        
        <input list="default_params" id="p_param_name" class="prop-input-active" placeholder="Chọn hoặc gõ tên Parameter..." style="margin-bottom: 8px;">
        <datalist id="default_params">
          <option value="View Name">Đổi tên View / Schedule</option>
          <option value="Title on Sheet">Tên hiển thị trên bản vẽ</option>
          
          <option value="Sheet Name">Tên bản vẽ (Sheet)</option>
          <option value="Sheet Number">Số hiệu bản vẽ</option>
          <option value="Comments">Ghi chú</option>
          <option value="Mark">Ký hiệu</option>
        </datalist>

        <input id="p_param_val" placeholder="Enter new value..." class="prop-input-active">
      </div>

      <button onclick="sendUpdate()" style="width:100%; justify-content:center;">Đẩy lên Revit</button>
    </div>
  </div>

  <div class="col-preview">
    <div id="previewActions" style="display:none; text-align:center; width:100%">
        <button onclick="requestRender()" style="background:#6c757d; padding: 6px 20px; margin: 0 auto;"> Render ảnh</button>
        <p style="font-size:11px; color:var(--text-muted); margin-top:8px">Render view hiện tại trong Revit và gửi ảnh về đây.</p>
    </div>

    <div id="previewMsg" style="color:var(--text-muted); margin-top:40px; text-align:center">
      View hiện ảnh ở đây. 
    </div>
    
    <div class="img-container" id="imgWrap" style="display:none">
      <img id="previewImg" alt="View Preview" onclick="openModal()" title="Nhấp để phóng to">
      <div style="text-align:center; margin-top:10px; font-size:11px; color:var(--text-muted); font-weight: 500;">
        Image from Revit (Nhấp vào ảnh để phóng to)
      </div>
    </div>
  </div>
</div>

<div id="imageModal" class="modal" onclick="closeModal()">
  <span class="close-modal">&times;</span>
  <img class="modal-content" id="imgModalExpanded" onclick="event.stopPropagation()">
</div>

<div id="statusBar">
    <span id="statusText">Ready.</span>
    <span style="color:var(--text-muted)">Socket: <span id="socketStatus" style="font-weight:bold;">Disconnected</span></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<script>
// --- CONFIG ---
const CONFIG = { RENDER_TIMEOUT: 180000 };
let selectedNode = null;
let socket = null;
let currentProjectId = null;
const pendingCmds = new Map();

// --- SETUP ---
if(localStorage.getItem("apiKey")) document.getElementById("apiKey").value = localStorage.getItem("apiKey");

function getHeaders() {
  const key = document.getElementById("apiKey").value;
  localStorage.setItem("apiKey", key);
  return { "Content-Type": "application/json", "X-API-Key": key };
}

function setStatus(msg, type='') {
  const el = document.getElementById("statusText");
  el.textContent = msg;
  el.className = type === 'error' ? 'status error' : (type === 'success' ? 'status success' : '');
}

function showLoading(show, text="Processing...") {
  document.getElementById("loadingText").textContent = text;
  document.getElementById("loading").style.display = show ? "flex" : "none";
}

// --- SOCKET.IO LOGIC ---
function initSocket(pid) {
    if(socket && currentProjectId === pid) return;
    
    if(!window.io) {
        setStatus("Socket.IO library not loaded!", "error");
        return;
    }
    socket = io(); // Đã gỡ transports websocket để mạng ổn định hơn
    currentProjectId = pid;

    socket.on('connect', () => {
        const el = document.getElementById("socketStatus");
        el.textContent = "Connected";
        el.style.color = "var(--success-color)";
        socket.emit('subscribe', { projectId: pid });
    });

    socket.on('disconnect', () => {
        const el = document.getElementById("socketStatus");
        el.textContent = "Disconnected";
        el.style.color = "#d13438";
    });

    socket.on('command_result', (data) => {
        if(!data || !data.id) return;
        const task = pendingCmds.get(data.id);
        if(!task) return;

        // 1. ÉP TẮT VÒNG TRÒN LOADING NGAY LẬP TỨC
        showLoading(false);

        // 2. Chờ 50 mili-giây để Web xóa phông mờ, sau đó mới xử lý kết quả
        setTimeout(() => {
            if(data.status === 'done') {
                setStatus("Command Completed!", "success");
                
                if(data.imageUrl) {
                    const img = document.getElementById("previewImg");
                    img.src = data.imageUrl;
                    document.getElementById("imgWrap").style.display = "block";
                    document.getElementById("previewMsg").style.display = "none";
                } else {
                    // Nếu bạn KHÔNG muốn hiện popup nữa, hãy thêm dấu // ở đầu dòng alert bên dưới:
                    alert(data.message || "Cập nhật dữ liệu thành công!");
                }
                task.resolve(true);
            } else if(data.status === 'error') {
                setStatus("Error: " + data.message, "error");
                alert("Revit Error: " + data.message);
                task.resolve(false);
            }
            pendingCmds.delete(data.id);
        }, 50); 
    });
}

function waitForResult(cmdId) {
    return new Promise((resolve) => {
        const t = setTimeout(() => {
            if(pendingCmds.has(cmdId)) {
                pendingCmds.delete(cmdId);
                setStatus("Timeout: Revit did not respond.", "error");
                alert("Timeout waiting for Revit. Kiểm tra lại kết nối Socket và cửa sổ Add-in.");
                resolve(false);
            }
        }, CONFIG.RENDER_TIMEOUT);
        
        pendingCmds.set(cmdId, { resolve: (res) => { clearTimeout(t); resolve(res); } });
    });
}

// --- HÀM PHÓNG TO ẢNH (MODAL) ---
function openModal() {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("imgModalExpanded");
    const originalImg = document.getElementById("previewImg");
    
    if(originalImg.src) {
        modal.style.display = "block";
        modalImg.src = originalImg.src;
    }
}

function closeModal() {
    document.getElementById("imageModal").style.display = "none";
}

// Escape key để đóng ảnh
document.addEventListener('keydown', function(event) {
    if (event.key === "Escape") closeModal();
});


// --- ACTIONS ---

async function loadIndex() {
  const pid = document.getElementById("projectId").value;
  const q = document.getElementById("q").value.toLowerCase();
  
  showLoading(true, "Loading Tree...");
  initSocket(pid);

  try {
    const res = await fetch(`/api/projects/${pid}/browser-index/latest`, { headers: getHeaders() });
    
    if(res.status === 401) throw new Error("Unauthorized. Please check API Key.");
    if(res.status === 404) throw new Error("No data found. Click 'Publish to Web' in Revit first.");
    if(!res.ok) throw new Error(res.statusText);

    const data = await res.json();
    renderTree(data.nodes || [], q);
    setStatus("Tree loaded successfully.", "success");
  } catch(e) {
    setStatus(e.message, "error");
    alert("Load Failed: " + e.message);
  } finally {
    showLoading(false);
  }
}

async function openLatest3D() {
    const pid = document.getElementById("projectId").value;
    showLoading(true, "Checking for 3D model...");
    
    try {
        const res = await fetch(`/api/projects/${pid}/models/latest-glb`, { headers: getHeaders() });
        if(res.status === 404) throw new Error("Chưa có mô hình 3D. Hãy nhấn 'Publish to Web' trong Revit để tự động upload.");
        
        const data = await res.json();
        if(!data.latestGlbFile) throw new Error("File GLB null.");
        
        window.open(`/viewer_glb?file=${data.latestGlbFile}`, "_blank");
        setStatus("Opening 3D Viewer...", "success");
    } catch(e) {
        setStatus(e.message, "error");
        alert(e.message);
    } finally {
        showLoading(false);
    }
}

async function requestRender() {
    if(!selectedNode) return;
    await sendCommand("render_view_png", {
        targetUniqueId: selectedNode.revit.uniqueId,
        pixelSize: 1000
    });
}

async function sendUpdate() {
    if(!selectedNode) return;
    const paramName = document.getElementById("p_param_name").value;
    const val = document.getElementById("p_param_val").value;
    if(!val) return alert("Please enter value");
    
    // Gửi lệnh xuống Revit và CHỜ kết quả trả về xem có thành công (true) không
    const isSuccess = await sendCommand("update_parameter", {
        targetUniqueId: selectedNode.revit.uniqueId,
        parameters: { [paramName]: val }
    });

    // --- [THÊM MỚI] TỰ ĐỘNG CẬP NHẬT CHỮ TRÊN WEB NẾU THÀNH CÔNG ---
    if (isSuccess) {
        if (paramName === "Sheet Name" || paramName === "View Name" || paramName === "Sheet Number") {
            let newTitle = val;
            
            // Xử lý riêng cho Sheet (Bản vẽ) vì C# đang ghép theo chuẩn "Số hiệu - Tên bản vẽ"
            if (selectedNode.kind === "sheet") {
                let parts = selectedNode.title.split(" - ");
                if (parts.length > 1) {
                    if (paramName === "Sheet Name") newTitle = parts[0] + " - " + val;
                    if (paramName === "Sheet Number") newTitle = val + " - " + parts[1];
                }
            }

            // 1. Lưu lại vào bộ nhớ ngầm của trình duyệt
            selectedNode.title = newTitle;

            // 2. Thay đổi chữ trên Cây thư mục (bên trái)
            const activeLeafTitle = document.querySelector(".leaf.selected .leaf-title");
            if (activeLeafTitle) activeLeafTitle.textContent = newTitle;

            // 3. Thay đổi chữ ở ô Item Name (bên phải)
            document.getElementById("p_name").value = newTitle;
        }
    }
}

async function sendCommand(action, payload) {
    const pid = document.getElementById("projectId").value;
    showLoading(true, "Sending command to Revit...");
    setStatus("Sending command...");

    try {
        const res = await fetch(`/api/projects/${pid}/commands`, {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ action, ...payload })
        });

        if(!res.ok) {
            if(res.status === 401) throw new Error("Unauthorized. Check API Key.");
            throw new Error("Send failed");
        }

        const data = await res.json();
        setStatus("Waiting for Revit response...");
        return await waitForResult(data.id); 
        
    } catch(e) {
        setStatus(e.message, "error");
        alert("Command Failed: " + e.message);
        return false; // [ĐÃ SỬA]
    } finally {
        showLoading(false);
    }
}

// --- UI RENDERING ---
function renderTree(nodes, query) {
  const root = document.getElementById("treeRoot");
  root.innerHTML = "";
  
  const tree = {};
  nodes.forEach(n => {
    if(query && !n.title.toLowerCase().includes(query)) return;
    
    let current = tree;
    (n.path || []).forEach(folder => {
      if(!current[folder]) current[folder] = { __type: 'folder', children: {} };
      current = current[folder].children;
    });
    current[n.title + n.revit?.uniqueId] = { __type: 'item', data: n };
  });

  root.appendChild(createDomTree(tree));
}

function createDomTree(obj) {
  const ul = document.createElement("div");
  Object.keys(obj).forEach(key => {
    const node = obj[key];
    if(node.__type === 'folder') {
      const details = document.createElement("details");
      details.open = true;
      const sum = document.createElement("summary");
      sum.textContent = key;
      details.appendChild(sum);
      
      const children = createDomTree(node.children);
      children.className = "node";
      details.appendChild(children);
      ul.appendChild(details);
    } else {
      const row = document.createElement("div");
      row.className = "leaf";
      
      const title = document.createElement("div");
      title.className = "leaf-title";
      title.textContent = node.data.title;
      
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = node.data.kind;
      
      row.appendChild(title);
      row.appendChild(tag);
      
      if(node.data.meta?.viewType === "ThreeD") {
          const btnEx = document.createElement("button");
          btnEx.textContent = "Ex 3D";
          btnEx.title = "Export specific view (Optional)";
          btnEx.className = "leaf-actions";
          btnEx.onclick = (e) => {
              e.stopPropagation();
              sendCommand("export_view_glb", { targetUniqueId: node.data.revit.uniqueId });
          };
          row.appendChild(btnEx);
      }

      row.onclick = () => selectItem(row, node.data);
      ul.appendChild(row);
    }
  });
  return ul;
}

function selectItem(el, data) {
  document.querySelectorAll(".leaf").forEach(x => x.classList.remove("selected"));
  el.classList.add("selected");
  selectedNode = data;
  
  document.getElementById("propMsg").style.display = "none";
  document.getElementById("propForm").style.display = "block";
  document.getElementById("p_name").value = data.title;
  document.getElementById("p_uid").value = data.revit?.uniqueId || "";
  document.getElementById("p_param_val").value = "";
  
  const isView = ['view','sheet','schedule'].includes(data.kind);
  document.getElementById("previewActions").style.display = isView ? "block" : "none";
  document.getElementById("previewMsg").style.display = isView ? "block" : "none";
  document.getElementById("imgWrap").style.display = "none";
}

document.getElementById("q").addEventListener("keyup", e => { if(e.key==="Enter") loadIndex(); });
</script>
</body>
</html>
